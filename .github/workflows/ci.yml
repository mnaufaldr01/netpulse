name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_DB: netpulse
  POSTGRES_USER: netpulse
  POSTGRES_PASSWORD: netpulse_dev
  S3_ENDPOINT_URL: http://localhost:9000
  S3_BUCKET: netpulse-lake
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_DEFAULT_REGION: us-east-1

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -m "not integration" --cov=netpulse --cov=transforms --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: netpulse
          POSTGRES_PASSWORD: netpulse_dev
          POSTGRES_DB: netpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netpulse -d netpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Wait for MinIO
        run: |
          python - <<'PY'
          import time
          import boto3
          for attempt in range(30):
              try:
                  boto3.client(
                      "s3",
                      endpoint_url="http://localhost:9000",
                      aws_access_key_id="minioadmin",
                      aws_secret_access_key="minioadmin",
                      region_name="us-east-1",
                  ).list_buckets()
                  break
              except Exception:
                  time.sleep(2)
          else:
              raise SystemExit("MinIO not ready")
          PY

      - name: Bootstrap database
        run: PYTHONPATH=. python -c "from tests.fixtures.bootstrap_db import bootstrap_database; bootstrap_database()"

      - name: Initialize MinIO bucket
        run: python scripts/init_minio_buckets.py

      - name: Run integration tests
        run: pytest -m integration -v

  dbt:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: netpulse
          POSTGRES_PASSWORD: netpulse_dev
          POSTGRES_DB: netpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netpulse -d netpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt and bootstrap helpers
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres==1.7.14 psycopg2-binary

      - name: Bootstrap database
        run: PYTHONPATH=. python -c "from tests.fixtures.bootstrap_db import bootstrap_database; bootstrap_database()"

      - name: dbt seed, run, test
        working-directory: dbt
        run: |
          dbt seed --profiles-dir .
          dbt run --profiles-dir .
          dbt test --profiles-dir .
